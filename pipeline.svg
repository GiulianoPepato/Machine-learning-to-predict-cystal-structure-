<svg width="680" viewBox="0 0 680 920" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#555" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrow-gray" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#999" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- BG -->
  <rect width="680" height="920" fill="#ffffff"/>

  <!-- Step 1: Materials Project API -->
  <rect x="190" y="20" width="300" height="56" rx="8" fill="#E6F1FB" stroke="#378ADD" stroke-width="0.5"/>
  <text x="340" y="43" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#0C447C">Materials Project API</text>
  <text x="340" y="61" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#185FA5">Extração da base de dados</text>

  <line x1="340" y1="76" x2="340" y2="108" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Step 2: GGA filter -->
  <rect x="190" y="110" width="300" height="56" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
  <text x="340" y="133" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#085041">Filtragem por funcional DFT</text>
  <text x="340" y="151" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#0F6E56">GGA e GGA+U apenas</text>

  <line x1="340" y1="166" x2="340" y2="198" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Step 3: Stability filter -->
  <rect x="190" y="200" width="300" height="56" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
  <text x="340" y="223" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#085041">Filtragem por estabilidade</text>
  <text x="340" y="241" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#0F6E56">Apenas materiais termodinamicamente estáveis</text>

  <line x1="340" y1="256" x2="340" y2="288" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Step 4: Split -->
  <rect x="190" y="290" width="300" height="56" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
  <text x="340" y="313" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#412402">Divisão do dataset</text>
  <text x="340" y="331" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#633806">Preparação vs. validação</text>

  <!-- Fork arrows -->
  <line x1="255" y1="346" x2="163" y2="388" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="425" y1="346" x2="517" y2="388" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Left: Preparation set -->
  <rect x="50" y="390" width="220" height="56" rx="8" fill="#EEEDFE" stroke="#7F77DD" stroke-width="0.5"/>
  <text x="160" y="413" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#26215C">Conj. de preparação</text>
  <text x="160" y="431" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#3C3489">Data augmentation aplicado</text>

  <!-- Right: Validation set -->
  <rect x="410" y="390" width="220" height="56" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
  <text x="520" y="413" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#2C2C2A">Conj. de validação</text>
  <text x="520" y="431" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#444441">Sem augmentation</text>

  <line x1="160" y1="446" x2="160" y2="498" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="520" y1="446" x2="520" y2="498" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Features left -->
  <rect x="50" y="500" width="220" height="56" rx="8" fill="#FAECE7" stroke="#D85A30" stroke-width="0.5"/>
  <text x="160" y="523" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#4A1B0C">Atribuição de features</text>
  <text x="160" y="541" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#712B13">Features atômicas (preparação)</text>

  <!-- Features right -->
  <rect x="410" y="500" width="220" height="56" rx="8" fill="#FAECE7" stroke="#D85A30" stroke-width="0.5"/>
  <text x="520" y="523" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#4A1B0C">Atribuição de features</text>
  <text x="520" y="541" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#712B13">Features atômicas (validação)</text>

  <!-- Left features -> Train/Test -->
  <line x1="160" y1="556" x2="160" y2="598" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Right features -> ML Training (L-shaped) -->
  <path d="M520 556 L520 728 L272 728" fill="none" stroke="#aaa" stroke-width="1" marker-end="url(#arrow-gray)"/>

  <!-- Train/Test split -->
  <rect x="50" y="600" width="220" height="56" rx="8" fill="#EEEDFE" stroke="#7F77DD" stroke-width="0.5"/>
  <text x="160" y="623" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#26215C">Divisão treino / teste</text>
  <text x="160" y="641" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#3C3489">A partir do conj. de preparação</text>

  <line x1="160" y1="656" x2="160" y2="698" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- ML Training -->
  <rect x="50" y="700" width="220" height="56" rx="8" fill="#E6F1FB" stroke="#378ADD" stroke-width="0.5"/>
  <text x="160" y="723" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#0C447C">Treinamento e avaliação</text>
  <text x="160" y="741" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#185FA5">Modelos de ML comparados</text>

  <!-- ML Training -> Best model -->
  <line x1="270" y1="728" x2="316" y2="782" stroke="#555" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Best model analysis -->
  <rect x="190" y="784" width="300" height="56" rx="8" fill="#EAF3DE" stroke="#639922" stroke-width="0.5"/>
  <text x="340" y="807" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#173404">Análise do melhor modelo</text>
  <text x="340" y="825" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#27500A">Desempenho e limitações avaliados</text>

  <!-- Legend -->
  <rect x="40" y="862" width="10" height="10" rx="2" fill="#E6F1FB" stroke="#378ADD" stroke-width="0.5"/>
  <text x="56" y="867" dominant-baseline="central" font-size="11" fill="#444">Entrada / Modelo</text>
  <rect x="160" y="862" width="10" height="10" rx="2" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
  <text x="176" y="867" dominant-baseline="central" font-size="11" fill="#444">Filtragem</text>
  <rect x="250" y="862" width="10" height="10" rx="2" fill="#EEEDFE" stroke="#7F77DD" stroke-width="0.5"/>
  <text x="266" y="867" dominant-baseline="central" font-size="11" fill="#444">Preparação</text>
  <rect x="350" y="862" width="10" height="10" rx="2" fill="#FAECE7" stroke="#D85A30" stroke-width="0.5"/>
  <text x="366" y="867" dominant-baseline="central" font-size="11" fill="#444">Features</text>
  <rect x="430" y="862" width="10" height="10" rx="2" fill="#EAF3DE" stroke="#639922" stroke-width="0.5"/>
  <text x="446" y="867" dominant-baseline="central" font-size="11" fill="#444">Resultado</text>
</svg>
